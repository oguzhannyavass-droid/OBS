<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli - OBS</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">OBS Admin</div>
        <div class="nav-user">
            <span>Hoşgeldiniz, {{ name }}</span>
            <a href="/logout" class="btn btn-outline">Çıkış Yap</a>
        </div>
    </nav>
    <main class="container">
        <!-- İstatistik Kartları -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3>Toplam Kullanıcı</h3>
                    <p id="statTotalUsers">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👨‍🎓</div>
                <div class="stat-info">
                    <h3>Öğrenciler</h3>
                    <p id="statTotalStudents">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👨‍🏫</div>
                <div class="stat-info">
                    <h3>Akademisyenler</h3>
                    <p id="statTotalAcademicians">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-info">
                    <h3>Açılan Dersler</h3>
                    <p id="statTotalCourses">0</p>
                </div>
            </div>
        </div>

        <div class="dashboard-grid">
            <section class="card">
                <h2>Kullanıcı Ekle</h2>
                <form id="addUserForm" class="form-grid">
                    <div class="input-group">
                        <label>Ad Soyad</label>
                        <input type="text" id="newUserName" required>
                    </div>
                    <div class="input-group">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="newUserUsername" required>
                    </div>
                    <div class="input-group">
                        <label>Şifre</label>
                        <input type="password" id="newUserPassword" required>
                    </div>
                    <div class="input-group">
                        <label>Rol</label>
                        <select id="newUserRole">
                            <option value="student">Öğrenci</option>
                            <option value="academician">Akademisyen</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Kullanıcı Ekle</button>
                </form>
            </section>

            <section class="card">
                <h2>Ders Ekle</h2>
                <form id="addCourseForm" class="form-grid">
                    <div class="input-group">
                        <label>Ders Adı</label>
                        <input type="text" id="newCourseName" required>
                    </div>
                    <div class="input-group">
                        <label>Atanacak Akademisyen</label>
                        <select id="courseInstructor" required>
                            <!-- Doldurulacak -->
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Ders Ekle</button>
                </form>
            </section>
        </div>
        
        <div class="card mt-2">
            <h2>Kullanıcı Listesi</h2>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Ad Soyad</th><th>Kullanıcı Adı</th><th>Rol</th></tr>
                    </thead>
                    <tbody id="usersList"></tbody>
                </table>
            </div>
        </div>

        <div class="card mt-2">
            <h2>Ders Listesi</h2>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Ders Adı</th><th>Akademisyen</th></tr>
                    </thead>
                    <tbody id="coursesList"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAdminDashboard);
    </script>
</body>
</html>
